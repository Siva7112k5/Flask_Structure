{% extends "base.html" %}

{% block title %}Forgot Password - Triowise{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2>Reset Password</h2>
        <p class="auth-subtitle">Enter your email to receive reset instructions</p>
        
        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            
            <button type="submit" class="btn-primary">Send Reset Link</button>
        </form>
        
        <p class="auth-link">
            <a href="{{ url_for('login') }}">Back to Login</a>
        </p>
    </div>
</div>

<style>
.auth-subtitle {
    color: #666;
    font-size: 14px;
    margin-bottom: 25px;
}
/* Container to center the box on the screen */
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh; /* Keeps it centered vertically */
    padding: 20px;
}

/* The white card for the form */
.auth-box {
    background: #ffffff;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    width: 100%;
    max-width: 400px;
    text-align: center;
}

.auth-box h2 {
    margin-bottom: 10px;
    color: #333;
    font-size: 24px;
}

/* Form Grouping */
.form-group {
    text-align: left;
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: #555;
    font-size: 14px;
}

/* Input Styling */
.form-control {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 16px;
    transition: border-color 0.3s ease;
    box-sizing: border-box; /* Prevents padding from adding to width */
}

.form-control:focus {
    outline: none;
    border-color: #4a90e2; /* Modern blue */
}

/* Button Styling */
.btn-primary {
    width: 100%;
    padding: 12px;
    background:linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.3s ease;
}

.btn-primary:hover {
   background:linear-gradient(135deg, #9099c4, #764ba2);
}

/* Back to Login Link */
.auth-link {
    margin-top: 20px;
    font-size: 14px;
}

.auth-link a {
    color: #1cd113;
    text-decoration: none;
}

.auth-link a:hover {
    text-decoration: underline;
}
</style>

{% endblock %}
